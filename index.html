<!DOCTYPE html>
<html>
<head>
    <title>PlaceGuesser Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 90vh; width: 100vw; }
        #confirm-btn { 
            height: 10vh; width: 100%; 
            background: #248b91; color: white; 
            border: none; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="confirm-btn">Підтвердити вибір</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо вікно на весь екран

        // Ініціалізація карти (центр світу)
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let selectedCoords = null;
        let marker = null;

        // Обробка кліку по карті
        map.on('click', function(e) {
            selectedCoords = e.latlng;
            if (marker) {
                marker.setLatLng(selectedCoords);
            } else {
                marker = L.marker(selectedCoords).addTo(map);
            }
        });

        // Відправка даних боту
        document.getElementById('confirm-btn').addEventListener('click', () => {
            if (!selectedCoords) {
                alert("Будь ласка, обери точку на карті!");
                return;
            }
            // Відправляємо дані у форматі JSON
            const data = JSON.stringify({
                lat: selectedCoords.lat,
                lng: selectedCoords.lng
            });
            tg.sendData(data); // Ця функція закриває Web App і шле дані боту
        });
    </script>
</body>
</html>
